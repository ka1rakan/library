<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">

</head>
<body>
    <header>
        <p>library</p>
        <button id="log-in-btn" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">
            Log in
          </button>
    </header>
    <main>
        <dialog class="modal">
            <form>
                <div class="form-row">
                    <input id="title" type="text" placeholder="Title" required autofocus>
                </div>
                <div class="form-row">
                    <input id="author" type="text" placeholder="Author" required>
                </div>
                <div class="form-row">
                    <input id="pages" type="number" placeholder="Pages" required>
                </div>
                <div class="form-row-cb">
                    <label for="read">Have you read it?</label>
                    <input id="read" type="checkbox">
                </div>
                <div class="form-row-btn">
                    <button id="confirm-dialog" value="default" formmethod="dialog" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                        Add Book
                      </button>
                      <button value="cancel" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                        Cancel
                      </button>
                </div>
            </form>
        </dialog>
        <div>
            <button id="add-book-btn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                + Add Book
            </button>
        </div>
        <div class="container">
            
        </div>
    </main>
    <footer>Copyright © 2023 ka1rkan <a href="https://github.com/ka1rakan"><i class="bi bi-github"></a></i></footer>
</body> 
</html>
